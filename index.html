<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For Someone Special ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Floating Hearts -->
    <div id="hearts"></div>

    <!-- ================= LANDING PAGE ================= -->

    <section class="landing" id="landingPage">

        <div class="glass">

            <h3>Hello ❤️</h3>

            <h1 id="typing"></h1>

            <p>

                I made something special...

                <br>

                Only for You 💖

            </p>

            <button id="startBtn">

                Start Our Story ❤️

            </button>

        </div>

    </section>

    <!-- ================= PROPOSAL PAGE ================= -->

    <section class="proposal-page" id="proposalPage" style="display:none;">

        <div class="proposal-card">

            <div class="emoji">
                ❤️
            </div>

            <h1>
                Will You Be Mine?
            </h1>

            <p>
                I promise to make you smile every single day 💖
            </p>

            <div class="buttons">

                <button id="yesBtn" class="yes-btn">
                    Yes ❤️
                </button>

                <button id="noBtn" class="no-btn">
                    No 😒
                </button>

            </div>

            <p class="hint">
                Try clicking No 😏
            </p>

        </div>

    </section>

    <!-- Typed JS -->

    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>

    <!-- Script -->

    <script src="script.js"></script>

</body>

</html>
